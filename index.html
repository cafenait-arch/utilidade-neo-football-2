<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Jogadores</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
</head>
<body>
  <h1>⚽ Mercado Livre</h1>

  <div class="controls">
    <div id="db-status" class="status loading">Carregando data.db...</div>

    <label>Quantidade de Jogadores</label>
    <input type="number" id="count" value="10" min="1" max="200" />

    <label>Nacionalidade</label>
    <select id="country" disabled>
      <option value="all">Carregando...</option>
    </select>

    <button id="gen-btn" disabled>Gerar Jogadores</button>
  </div>

  <div id="player-list"></div>
  <script src="script.js"></script>
</body>
</html>
